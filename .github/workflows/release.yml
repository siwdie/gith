name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Lint & Build
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --no-git-checks
  
  binaries:
    name: Build & upload binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node24-linux-x64
          - os: ubuntu-latest
            target: node24-win-x64
          - os: macos-latest
            target: node24-macos-arm64
    runs-on: ${{ matrix.os }}
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build binaries
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARGET="${{ matrix.target }}"

          case "$TARGET" in
            *linux*x64*)   NAME="gith-v${VERSION}-linux-x64" ;;
            *macos*arm64*) NAME="gith-v${VERSION}-macos-arm64" ;;
            *win*x64*)     NAME="gith-v${VERSION}-win-x64.exe" ;;
            *)
              echo "Unsupported target: $TARGET"
              exit 1
              ;;
          esac

          npx @yao-pkg/pkg dist/cli.cjs \
            --targets "$TARGET" \
            --output "binaries/$NAME" \
            --fallback-to-source

      - name: Upload binaries to release
        run: gh release upload ${{ github.event.release.tag_name }} binaries/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: binaries
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: read

    steps:
      - name: Checkout gith repository
        uses: actions/checkout@v6

      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: siwdie/homebrew-gith
          token: ${{ secrets.HOMEBREW_GITH_TOKEN }}
          path: homebrew-gith

      - name: Resolve release asset values
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MACOS_ARM64_BINARY_FILE="gith-v${VERSION}-macos-arm64"
          LINUX_X64_BINARY_FILE="gith-v${VERSION}-linux-x64"

          MACOS_ARM64_SHA256=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo siwdie/gith \
            --json assets \
            --jq '.assets[] | select(.name == "'"$MACOS_ARM64_BINARY_FILE"'") | .digest' | sed 's/^sha256://')

          LINUX_X64_SHA256=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo siwdie/gith \
            --json assets \
            --jq '.assets[] | select(.name == "'"$LINUX_X64_BINARY_FILE"'") | .digest' | sed 's/^sha256://')

          if [ -z "$MACOS_ARM64_SHA256" ]; then
            echo "Could not resolve SHA256 for ${MACOS_ARM64_BINARY_FILE}"
            exit 1
          fi

          if [ -z "$LINUX_X64_SHA256" ]; then
            echo "Could not resolve SHA256 for ${LINUX_X64_BINARY_FILE}"
            exit 1
          fi

          echo "MACOS_ARM64_BINARY_FILE=$MACOS_ARM64_BINARY_FILE" >> "$GITHUB_ENV"
          echo "MACOS_ARM64_SHA256=$MACOS_ARM64_SHA256" >> "$GITHUB_ENV"
          echo "LINUX_X64_BINARY_FILE=$LINUX_X64_BINARY_FILE" >> "$GITHUB_ENV"
          echo "LINUX_X64_SHA256=$LINUX_X64_SHA256" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          node scripts/brew.mjs \
            --macosArm64BinaryFile="${MACOS_ARM64_BINARY_FILE}" \
            --macosArm64Sha256="${MACOS_ARM64_SHA256}" \
            --linuxX64BinaryFile="${LINUX_X64_BINARY_FILE}" \
            --linuxX64Sha256="${LINUX_X64_SHA256}" \
            --output="./homebrew-gith/Formula/gith.rb"

      - name: Commit and push formula update
        run: |
          cd homebrew-gith
          git config user.name "siwdie-gith-bot"
          git config user.email "siwdie-gith-bot@users.noreply.github.com"
          git add Formula/gith.rb

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          VERSION=$(node -p "require('../package.json').version")
          git commit -m "release: Version v${VERSION}"
          git push