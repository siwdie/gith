name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Lint & Build
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --no-git-checks
  
  binaries:
    name: Build & upload binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node24-linux-x64
          - os: ubuntu-latest
            target: node24-win-x64
          - os: macos-latest
            target: node24-macos-arm64
    runs-on: ${{ matrix.os }}
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build binaries
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARGET="${{ matrix.target }}"

          case "$TARGET" in
            *linux*x64*)   NAME="gith-v${VERSION}-linux-x64" ;;
            *macos*arm64*) NAME="gith-v${VERSION}-macos-arm64" ;;
            *win*x64*)     NAME="gith-v${VERSION}-win-x64.exe" ;;
            *)
              echo "Unsupported target: $TARGET"
              exit 1
              ;;
          esac

          npx @yao-pkg/pkg dist/cli.cjs \
            --targets "$TARGET" \
            --output "binaries/$NAME" \
            --fallback-to-source

      - name: Upload binaries to release
        run: gh release upload ${{ github.event.release.tag_name }} binaries/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew formula
    needs: binaries
    if: github.event.release.target_commitish == 'main'
    uses: ./.github/workflows/homebrew.yml
    secrets: inherit
    with:
      tag_name: ${{ github.event.release.tag_name }}