name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --no-git-checks
  
  binaries:
    name: Build & upload binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: node24-linux-x64,node24-win-x64
          - os: macos-latest
            targets: node24-macos-arm64
    runs-on: ${{ matrix.os }}
    needs: build
    if: github.event.release.target_commitish == 'main'

    permissions:
      contents: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build binaries
        run: npx @yao-pkg/pkg dist/cli.cjs --targets ${{ matrix.targets }} --output binaries/gith --fallback-to-source

      - name: Rename binaries
        run: node scripts/rename-binaries.mjs

      - name: Upload binaries to release
        run: gh release upload ${{ github.event.release.tag_name }} binaries/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}